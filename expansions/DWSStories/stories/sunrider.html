“ Imagine a place like heaven.”
The voice didn’t echo.
It didn’t need to.
It carried anyway—deep, steady, layered with something that made the words feel heavier than they were.
“Endless sky. No decay. No time slipping through your fingers. Just… light. Stillness. Order.”
A pause.
Then—
“We are it. It’s called Eternity.”
Lyiri stood a few paces behind him, arms crossed, wings slightly extended—not for flight, just tension. She never liked when he started like that.
He didn’t turn around.
“I was setting the tone.”
“You were talking to no one.”
“That’s not entirely true.”
“It is.”
He smiled faintly, still facing the horizon.
Eternity stretched infinitely in all directions, though it never felt overwhelming. Fields of pale gold grass shifted without wind. Structures existed, but none dominated the landscape. Nothing decayed. Nothing rushed.
It wasn’t perfection.
It was maintenance.

He floated an inch off the ground, as usual.
Not for effect.
Walking just didn’t feel necessary.
Black hair, slightly unkempt. Fair skin untouched by time. His clothing sat somewhere between practical and ceremonial—dark, fitted layers beneath a long white robe trimmed in gold that hung open just enough to suggest movement underneath, but never enough to reveal anything clearly.
His eyes caught the light strangely.
Blue, but not just blue.
Reflective.
Like they remembered brightness.

“You’re going down again,” Lyiri said.
Not a question.
“You always say it like it’s a problem.”
“It becomes one when you forget the boundary.”
He turned this time, finally looking at her.
“I haven’t.”
She didn’t believe him.
She rarely did.

Arian approached from the distance, wings folding neatly as he came to a stop beside them. His posture was precise, almost mechanical in its consistency.
“Status is stable,” Arian said. “No disturbances across monitored zones. The lower plane remains unchanged.”
“Unchanged is good,” he replied.
“For them,” Lyiri added. “Not for you.”
He ignored that.

“Anything else?” he asked.
Arian hesitated a fraction longer than usual.
“Only… observation.”
“Go on.”
“You’ve increased frequency of visits.”
Lyiri scoffed lightly. “That’s one way to put it.”
“They’re interesting,” he said simply.
“They’re fragile,” Lyiri corrected. “Short-lived. Unaware. You watching them doesn’t change that.”
“It changes something.”
“What?”
He looked past them—past Eternity, past the visible horizon, toward something only he seemed to track.
“Perspective.”
Lyiri shook her head.
“You’re not supposed to need perspective.”
“I don’t need it,” he said calmly. “I prefer it.”

Silence settled briefly.
Then Arian shifted topics.
“The blade.”
That got his attention.
He reached behind him—not dramatically, just habit—and drew it into view.
Stellara.
Long as his own height. White metal, though not quite metal. Its edge didn’t gleam—it held light instead of reflecting it. The name etched into the handle was worn smooth from use.
“Still stable?” Arian asked.
“Yes.”
“You’ve been using it more.”
“It responds well.”
Lyiri stepped closer, eyeing it with mild disapproval.
“You found that thing in a crater.”
“On the moon,” he corrected.
“That doesn’t make it better.”
“It makes it interesting.”
She crossed her arms tighter. “You don’t know what made it.”
“I know what it does.”
“And that’s enough?”
“For now.”

He turned the blade slightly.
For a moment, it lost all sense of weight.
He let go.
It didn’t fall.
It hovered.
Then, with a small motion of his fingers, it drifted outward, stopping several meters away before snapping back into his hand instantly.
Controlled.
Precise.
Limited telekinesis—but enough.
“It listens,” he said.
“It shouldn’t,” Lyiri replied.

“Your blessing complements it,” Arian noted.
“It complements most things.”
That wasn’t arrogance.
It was fact.

Light wasn’t narrow.
It wasn’t specific.
It was broad.
One of the oldest categories of blessings—wide-reaching, adaptable, dangerous when refined. Not as raw as elder-tier abilities, but far more versatile than the narrow, focused ones.
Light could become many things.
And in his hands—
It usually did.

He lifted his hand slightly.
A faint glow formed—not blinding, not overwhelming. Just enough to exist.
Then brighter.
Then—
For a split second—
It flared.
Not uncontrolled.
Not wild.
Just enough to remind them.
Lyiri looked away first.
Arian didn’t—but his wings shifted slightly, instinctively.
The light faded.

“You’re proving a point,” Lyiri said.
“I’m reminding you I’m capable.”
“We’re aware.”
“Good.”

Another pause.
Then—
“I’m going down,” he said.

Lyiri exhaled sharply. “Of course you are.”
Arian remained neutral. “Same precautions?”
“Yes.”
“No direct interference?”
“Unless necessary.”
“No full manifestation?”
A small pause.
“…Correct.”
Lyiri noticed it.
She always did.

“They can’t see you unless you let them,” she said.
“I know.”
“You’ve broken that before.”
“Once.”
“That was enough.”
He didn’t argue.

Long ago, when the world below had been darker—less structured, less understood—he had become something else for them.
Not a figure.
Not a person.
Just light.
A point in the sky that didn’t move.
They couldn’t look at him.
That was the point.
He didn’t need to be seen to be useful.

“I’m not doing that again,” he said.
“You better not.”

He stepped toward the edge of Eternity.
There was no drop.
No cliff.
Just a thinning.
Reality giving way to something denser below.

“Try not to get involved,” Lyiri added.
“I won’t.”
“Try harder.”
He smiled slightly.

Then—
He was gone.

No flash.
No sound.
Just absence where he had been.

And presence somewhere else.

Greenheaven, Wisconsin.

The air was heavier here.
Not physically—just… dense. Full of motion, sound, imperfection. Buildings stretched upward in clean lines. Streets carried movement in every direction. People filled space without noticing how small they were within it.
He stood among them.
Unseen.
Not invisible—just unrecognized.
Clothing shifted to match the environment. Simpler. Less… divine. The robe gone, replaced with something that blended.
He walked.
Observed.
Listened.

A street musician played off-key near a corner.
Two people argued quietly over something that didn’t matter.
A child laughed.
Someone dropped their phone.
Life.
Messy.
Uncontrolled.
Interesting.

He stepped through a doorway—
And out of another across the street.
Portals, subtle, quick, unnoticeable unless you knew exactly what to look for.
He liked moving this way.
No disruption.
No attention.

He moved again.
A rooftop now.
Then street level.
Then a park.
Watching.
Always watching.

It started with silence.
Not complete.
Just enough.
Conversations slowed.
Movement hesitated.
Heads tilted upward.
One by one.
Like something unseen had shifted.

He followed their gaze.
And saw her.

Floating.
But not like him.
There was no ease to it.
No balance.
She hung in the air unnaturally, slightly angled, like gravity had lost interest in applying correctly.
Old.
Not just in age.
In presence.
Worn thin in the wrong ways.

Her clothing was black.
Heavy.
Layered.
Wrong for the air she occupied.
And her skin—
Cracked.
Thin fractures spread across it, glowing faintly from within with a sick, green light.
Not bright.
Not clean.
Wrong.

The crowd didn’t understand.
But they felt it.
Fear moved faster than thought.

He didn’t move.
Not yet.

She wasn’t looking at them.

She was searching.

Slowly, her head turned.
Scanning.
Not with sight.
With something deeper.

Then—
She stopped.

And looked directly at him.

The noise of the city didn’t return.
It dropped further.
Like the world itself was waiting.

He exhaled quietly.
“…That’s new.”

She tilted her head.
The cracks along her skin pulsed faintly.
Recognition.
Not of him.
Of what he carried.

A soul.
A blessing.
Light.

He stepped back.
Once.
Twice.
Blending into the crowd as their attention remained fixed upward.

An alley.
A fire escape.
A rooftop.

Distance.

Privacy.

The air shifted around him.
Not dramatically.
Just enough.

The robe returned.
White.
Gold-trimmed.
Settling naturally around him.

Light gathered faintly at his shoulders.

His hand reached back.

Stellara slid free.

Weightless.

He stepped forward.

And let the illusion fall completely.

The Sunrider stood.

Below, the crowd gasped.
Some pointed.
Some ran.
Some didn’t move at all.

She was already watching him.
Of course she was.

“You’re not supposed to be here,” he called out, voice deepened, amplified—not shouted, but carried with undeniable force.

Her lips parted slightly.
When she spoke, it wasn’t singular.
It layered.
Like multiple voices slightly out of sync.

“Bright,” she said.

Not curiosity.

Hunger.

He raised Stellara.
Light gathered.

The air tightened.

And somewhere, deep in the structure of things—
Something older than both of them—
Watched.

She moved first.
Not with speed.
With certainty.
Her fingers curled slightly—
And the air around him tightened.

He felt it before it became visible.
A pull. Not toward her exactly, but toward a point that only she defined. Space itself compressing, folding inward with quiet force.
He didn’t resist.
Not immediately.
He let it take him a meter. Two.
Measured.
Then—
He stepped sideways through a slit of light that hadn’t existed a second before.
The pull collapsed on empty air.
He reappeared above her, already moving.

“Let’s not do this over the street,” he said, voice carrying low and controlled.
No response.
Only pressure.

She didn’t follow him.
The sky adjusted.

He felt the distortion spike behind him.
Turned—
Too late.
The force hit like a silent wall.
He raised Stellara instinctively, light flaring along its edge as a barrier snapped into place—
It held.
For a fraction.
Then shattered.

The impact sent him crashing backward through open air, his body skipping once across the upper frame of a building before punching straight through it. Glass and steel burst outward as he tore across an interior space, slammed into a far wall, and dropped hard into the debris below.
Silence.
Then ringing.

He stayed there for a second.
Not because he couldn’t move.
Because he was recalculating.
“…Right,” he muttered, pushing himself up through broken concrete.

The ceiling above him peeled open.
Not physically.
Space itself thinned—and she stepped through it.
Still floating.
Still composed.
Still watching.

“You’re not subtle,” he said, dust falling from his shoulders as he stepped back into open air through a portal of his own.
The city stretched below again.
He hovered.
Reset.

Light gathered behind him.

Arrows formed.

Dozens.
Thin, precise constructs of condensed light hovering in formation at his back. They pulsed once—aligned—
Then fired.

They broke the sound barrier instantly.
White streaks tore through the air toward her in a perfect converging pattern.

She didn’t move.

They struck—
And vanished.

Not deflected.
Not blocked.
Consumed.
The green glow beneath her skin pulsed once, slightly brighter.

“…You absorb it,” he said.
Not surprised.
Just confirming.

She tilted her head.
“Strong,” she replied.

He exhaled slowly.
“Good.”

He moved.

A portal opened to his left—
He stepped through—
Reappeared behind her—
Stellara already descending in a clean arc.

The blade passed through her.

Nothing.

Her form blurred—distorted—reforming a few meters away without disruption.

Not illusion.
Not displacement.
Something worse.

He didn’t hesitate.
He threw the blade.

Stellara left his hand without weight, slicing through the air faster than gravity should allow. It curved mid-flight, correcting its path as if guided by intention alone.

This time—
It connected.

The edge carved across her side.
Not deep.
But enough.

The cracked surface of her skin split further.
Green light spilled outward—not liquid, not energy exactly—something between.

For the first time—
She reacted.
A slight recoil.
A shift.

His hand extended.
Stellara stopped midair—
Then snapped back into his grip.

“You can be touched,” he said.

Her expression didn’t change.
But the air did.

Pressure built.
Not outward.
Inward.

He felt it wrap around him.
Pulling.
Crushing.
Rewriting the space he occupied.

He opened a portal behind him—
It flickered.
Collapsed.
Gone.

“…That’s a problem,” he said quietly.

She raised her hand fully now.

The sky bent.

Not visually.
Structurally.
The distance between them shrank without movement. The air compressed into something heavier, harder to exist within.

He reacted fast.

Light condensed at his palm—
Then released.

A beam.

Pure white.
Focused.
Violent in its precision.
It tore through the space between them, distorting everything around it as it closed the gap instantly.

She met it.

A flash of green.

Her own beam answered.

Lime-tinted. Dense. Wrong.

They collided.

The impact didn’t explode.
It locked.

Two forces grinding against each other, pushing, resisting, neither giving ground. The air around them warped, bending outward in visible waves. Buildings below groaned under the pressure. Windows shattered in cascading bursts across multiple blocks.

He held it.
Steady.
Controlled.

She stepped forward.

Through it.

The beams didn’t stop her.
They wrapped around her form, splitting and reforming as she advanced, the green light eating into the white, gaining ground inch by inch.

“…Of course you would,” he muttered.

He cut the beam.

Instantly.

Shifted.

A portal snapped open at his side—
He stepped through—
Reappeared above—
Fired again—
From a different angle—

She was already turning.

Already countering.

This wasn’t a fight of speed.
It was a fight of scale.

And he was losing it.

Another flick of her fingers—

The force hit harder this time.

He crossed Stellara again—
Barrier—
Shatter—

He was thrown.
Hard.

Through another structure.
Then another.
Momentum finally dying as he crashed into open ground beyond the city’s edge, carving a trench through dirt and stone before stopping.

Silence.

He didn’t get up immediately.

“…Alright,” he said, staring up at the sky.

She descended slowly.
No rush.
No strain.

He pushed himself up.
Light flickering around him—not bright, but active. Healing. Closing damage as fast as it formed.

“You’re stronger than I thought,” he admitted.

She hovered above him.
Looking down.

“Hollow,” she said.

He frowned slightly.
“That hurts.”

She extended her hand.

This time—
He didn’t dodge.

The force wrapped around him completely.
Not pushing.
Not striking.
Holding.

He tried to open a portal—
Nothing.

Tried to move—
Limited.

The air itself had him.

She lifted her hand and he rose with it off the ground and into the sky.

The city shrank beneath them again.
People below were running now.
Some still watching.
Most gone.

He strained.
Light flaring—
Trying to break free—

It didn’t work.

“…Alright,” he said through clenched teeth.

Stellara trembled in his grip.

He threw it.

Even restrained, it moved.
The blade cut through the space between them—
Aimed—
Precise—

She caught it.

Bare-handed.

The light along its edge dimmed slightly where her fingers closed around it.

For the first time—
His expression changed.

She looked at the blade.
Then at him.

“Old,” she said.

Then—
With a small motion—
She sent him flying.

The force wasn’t explosive.
It was absolute.

He disappeared into the distance in a single instant.

Gone from the skyline.

Gone from the city.

And the space he left behind—
Fell quiet.

He hit the ground like a falling star.
No fire or trail.
Just force.

The impact carved a crater wide enough to swallow buildings, the earth collapsing inward before rebounding in a shockwave that flattened everything in a ring around it. Stone cracked. Trees snapped. The air burst outward in a violent pulse that echoed for kilometers.
Then—
Silence.

He lay at the center of it.
Breathing.
Barely.

“…That was… farther than expected,” he muttered, voice thin.
Germany.
Not that the location mattered to him in the moment—but he knew it anyway. Distance had never been a limitation for him.
Until now.

His body refused to move for a second.
Then two.
Then—
Light flickered.
Weak, but there.

Healing wasn’t instant anymore.
That was new.

He forced himself onto one knee, Stellara still in his grip, though it felt heavier than usual. That alone told him how much he’d lost already.
“Come on,” he said under his breath.
Light gathered slowly along his arms, threading through fractures, closing what it could. Not perfect. Not fast.
But enough to stand.

Around the crater’s edge—
People.

They hadn’t run, not all of them.
Phones raised. Voices hushed. Fear mixed with something else—something closer to awe.
They didn’t understand what they were looking at.
But they knew it mattered.

He looked up.
The sky above him was empty for a moment.

Then it wasn’t.

She appeared without descent.
Just… present, hovering above the crater like she had never left.

He exhaled slowly.
“Of course.”

The cracks along her skin burned brighter now.
In adaptation.

She raised her hand.

He reacted immediately—
Stellara lifting—
Light forcing itself outward—

Too slow.

The beam formed at her fingertips before his barrier could fully stabilize.
Lime-green and absolute.

It fired. This was it.

But it never reached him.

The impact came first—
A wall of white intercepting the strike, erupting outward in a layered shield that bent the beam around it in violent arcs of light.

The ground shook.

He blinked.

And she was there.

Lyiri.

Wings extended wide—massive, radiant, cutting through the dust like blades of pure structure. Feathers of light and form layered together, each one holding against the pressure of the beam striking her barrier.
She didn’t look back at him.
Didn’t say his name.

But her voice came anyway.
Low, tight, and controlled.

“You look terrible.”

He almost laughed.
“Good to see you too.”

The beam pressed harder but her barrier held.
Although not easily.

“Move,” she said.

“I’m trying.”

He forced himself upright again, light flickering unevenly across his form as he pulled more energy inward, stabilizing what he could.

Around them—
The people at the crater’s edge had gone silent.

Phones still raised and hands trembling.

An angel.

Not a metaphor or a story.

A being with wings of light stood between them and something worse.
Protecting—
Him.

“…This is a problem,” he muttered.

Lyiri’s wings shifted, adjusting to the pressure.
“You think?”

The beam stopped.

Abruptly.

She lowered her hand slightly, not dropping the shield entirely.
Watching.

The witch tilted her head again, observing Lyiri now.

“Another,” she said.

Lyiri didn’t respond but stepped forward instead.

The ground beneath her didn’t break.
It aligned.

“Stay behind me,” she said quietly.

“That’s not going to happen.”

“I wasn’t asking.”

He stepped up beside her anyway.

Light gathered again.
Stronger now but still unstable.

“Together then,” he said.

She didn’t argue.

The witch moved but this time—
They were ready.

Arrows formed behind him—
Dozens—
Then hundreds—
Launching in waves as he split his position through rapid portals, firing from shifting angles, forcing her to react.

Lyiri advanced directly.
Shield forward.
Wings cutting through the air as she closed distance with controlled force, each step deliberate.

The witch absorbed the first volley—
Then the second—
Then—
She pushed back.

The air shattered outward in a pulse that cracked Lyiri’s barrier for a fraction of a second, just enough.

She slipped through.

Her hand closed around Lyiri’s throat.

And everything stopped.

For a moment—
No sound.
No motion.

Lyiri didn’t struggle wildly.
Didn’t panic.
But her wings flared wide, light spiking as she tried to break free.

The witch tightened her grip.

“Strong,” she said again.

He didn’t hesitate.

A portal snapped open beside them—
Precise—
Close—

And Lyiri vanished.

Gone back to Eternity.

Her voice echoed once—
Sharp and angry.

“No—!”

Then silence.

He stood alone again.

The witch turned her attention back to him.

No hesitation or delay.

She raised her hand but he met it.

Light flared.into a beam.

White.

She answered instantly.

Green.

They collided again.

This time closer.

Stronger.

The ground beneath him fractured under the pressure. The crater widened as both forces tore at the space between them.

He barely held.

And she walked through it once again.

Closer.

Step by step.

He pushed harder.
Light intensifying, compressing, forcing everything he had left into the beam.

“…Not… this time…” he muttered.

But she reached him.

And her hand closed around his throat.

The beam snapped.

Gone.

The world shifted upwards.

The sky peeled away as they were pulled beyond it, atmosphere thinning instantly as the ground vanished beneath them.

Cold silence of Space.

He tried to move, tried to fight.

Nothing responded the way it should.

Her grip tightened.

The cracks along her skin flared brighter—
Then spread.

Reaching him, touching him.

He felt it immediately.

No pain, loss.

Something being taken and pulled.

His light dimmed.

The stars didn’t make sound.
They never had.
But as the last of his strength drained from him, the silence felt heavier than anything he’d ever known.

Her hand tightened around his throat.
crushing.
Holding.
Anchoring him in place while something far worse happened.

The cracks along her skin spread further, glowing brighter, reaching outward like veins of lightless fire. They touched him—threading across his chest, his arms, his face—
And where they touched—
He dimmed.

It wasn’t pain, not in the way people understood it.
It was the absence of his light leaving.

His breath came shallow and his vision blurred.
The stars behind her stretched, smeared into lines as his focus slipped.

“…No…” he rasped.

She leaned closer with her hollow eyes.

Voice layered.

“Yours.”

The pull deepened and his light—his blessing—was being stripped away piece by piece, drawn into her like fuel.

He tried to summon it or to flare.
But nothing answered the way it should.

For the first time there was nothing beneath him to draw from.

No reserve or control.

Just fading.

His hand twitched and Stellara drifted beside him, weightless for those last lingering seconds, as if waiting for a command that wouldn’t come.

“…Not… like this…” he whispered.

The stars blurred further and his body went cold.

But in that final moment—
Something old stirred in memory.

Not power.

Recognition.

He forced his eyes open.
Focused on nothing—yet everything.

“…Galaxial…” he breathed.

The word didn’t echo or carry.

It simply existed.

But something answered.

She didn’t notice at first
And why would she?
He was already fading, almost gone.

Then the stars shifted.

Not in a way the eye could track.
But the structure of space—
Changed.

Her grip paused just slightly.

Slightly oo late.

A hand appeared.

Not emerging, arriving. Already there.

It closed around her head and with no effort or resistance.

And crushed.

There was no explosion or struggle.
No drawn-out moment.

One instant she existed—
The next—
She didn’t.

Her form collapsed inward, the green glow snuffed out as if it had never been, fragments dissolving into nothing before they could scatter.

Silence returned and the hand released.

Gone.

Like it had never been there.

He didn’t see it clearly, or fully.

But he felt the presence

The presence.

Vast yet contained and unquestionable.

Then it was gone.

And he was falling.

No control,
No light,
No strength.’

Just gravity.

The atmosphere caught him hard.

Air screamed past as his body tore back toward the surface, heat building along his form—but he couldn’t respond, couldn’t shield, couldn’t slow.

The world rushed up.

Then impact.

This time not a crater.

Just collapse.


Voices in the distant.
L.

“—he’s breathing—”
“Don’t touch—wait—”
“Call—everyone—”

Hands, careful, and afraid.

He tried to open his eyes.
Failed.

Darkness again.

He woke to a steady rhythm.
Beep. Pause. Beep.
Soft light pressed against his eyes. Not the kind he commanded—this was artificial, contained, humming quietly from panels above or a moment, he didn’t move.
Didn’t reach for anything.
Just… existed.

Then memory returned.
Fragments first.
The sky. The green light. The hand at his throat.
And then—
Nothing.

He inhaled slowly.
It hurt.
That was new.

His eyes opened.
A ceiling. White. Smooth. Still.
Not Eternity.

“…Right,” he murmured.

He turned his head slightly.
Machines. Tubes. Clean lines. The quiet efficiency of human care.
And beyond that—
A window.

Something was wrong.

The light through it wasn’t normal.
Not dim. Not bright.
Just… blocked.

He pushed himself up.
Slowly.
His body resisted at first, then gave in piece by piece. Weak, but functional. A faint flicker of light danced along his fingers—unsteady, but present.

Voices outside the room.
Hushed.
Urgent.

The door opened.
A nurse stepped in.
She froze the moment she saw him upright.
Completely still.

“…You shouldn’t—” she started.
Then stopped.
Her eyes widened.
Not in confusion.
Recognition.

Behind her, a television mounted in the corner of the room played silently.
He glanced at it.
Footage.

Him.

The sky torn open with light.
The beam.
The fall.

Words scrolled across the bottom.
“Witnesses claim divine figure…” “Possible god-like entity confirmed…” “Global response—”

“…That spread quickly,” he said quietly.

The nurse took a step forward.
Then another.
Then—
She dropped.

Knees hitting the floor with a sharp, sudden sound.

“Our king…” she whispered.

He blinked.

“No,” he said immediately.

She didn’t look up.
Didn’t move.

“Our king has returned…”

“That’s not—”
He stopped.
Exhaled.
Looked past her—
Back to the window.

And understood.

He stood.
Fully this time.
Weak, but standing.

He walked to the window.

And looked out.

The world had gathered.

Not hundreds.
Not thousands.

Millions.

The streets were filled wall to wall, bodies pressed together in a sea that stretched farther than he could immediately track. Buildings were lined with people. Rooftops crowded. Every visible surface occupied.
Phones raised.
Signs held.
Silence.

They were waiting.

For him.

He stared for a long moment.
Processing.
Calculating.
Understanding the scale of it.

“…That’s too much,” he said under his breath.

Behind him, the nurse remained kneeling.

He turned slightly.
“Stand up.”

She hesitated.
Then obeyed, though her head stayed lowered.

“I’m not your king,” he said.

She said nothing.

“I’m not your lord either.”

A pause.

He looked back at the window.
At the sheer weight of expectation pressing upward toward him.

“…Call me your protector,” he continued, voice steady, carrying without force. “That’s all I am.”

He rested his hand lightly against the glass.

“A god, yes. But not something to rule you.”

Silence filled the room.

He stepped back.

Then forward again—
And the window wasn’t a barrier anymore.

He passed through it like it wasn’t there.

Gasps erupted below instantly.
A ripple through the crowd as millions reacted at once.

He floated.

High enough to be seen.
Low enough to be real.

They didn’t shout.
Not at first.

They stared.

He raised his hand.

The sky responded.

A tear formed above him—clean, precise, cutting through blue like a wound made of light. It widened slowly, revealing something brighter beyond. Not blinding.
Just… more.

The crowd broke then.
Voices rising.
Not fear.
Not panic.
Something else.

Hope.

He looked down at them one last time.

“You’ll be alright,” he said.

Not a promise.
But close enough.

Then—
He rose.

Faster this time.

Straight toward the opening.

Light gathered around him as he ascended, not flaring, not overwhelming—just present, undeniable.

And with one final motion—

He crossed through.

The sky sealed behind him.
Clean.
Silent.
Eternity welcomed him back without question—light stretching endlessly, untouched, unchanged.

And he dropped.

No control.
No grace.
Just weight.

He hit the ground hard, the impact sending a dull ripple through the still fields. For a second, he didn’t move. Couldn’t. The light around him flickered weakly, unstable after everything he’d forced it through.
“…Yeah,” he muttered into the ground. “That went well.”

Footsteps approached.
Measured.
Familiar.

Lyiri stopped a short distance away.
Arms crossed.
Wings folded tight.
She looked down at him—not angry.
Not relieved.
Something in between.

“…Learn your lesson?” she asked.

He didn’t lift his head.
One hand raised slightly.
A weak thumbs up.

“…I’ll be staying here,” he said. “For a while.”

Arian arrived moments later, wings settling as he scanned the scene quickly.
“You’re stable,” he noted.
“Debatable,” came the muffled reply.

For a moment—
Everything felt normal again.

Too normal.

Then—
It shifted.

Subtle.
But wrong.

The air didn’t change.
The light didn’t dim.

But something—
Pulled.

He felt it first.

Not physical.
Not forceful.

Familiar.

He pushed himself up slowly, eyes narrowing slightly.
“…Do you feel that?” he asked.

Lyiri’s posture changed instantly.
Wings half-open.
Tension.

“…Yes,” she said.

Arian turned, scanning outward across Eternity.
“There’s a disturbance,” he said. “Localized.”

The pull deepened.
Still not violent.
Still not aggressive.

But insistent.

Like something calling.

“Sunrider,” Arian started, focusing on something in the distance. “There’s a person in Eternity, I don’t kno—”

He stopped.

Because they were already there.

No portal.
No arrival.

Just… present.

Standing a short distance away.

Red.

That was the first thing.

Worn clothes, layered and rough, the kind that had seen time—not clean, not ceremonial, not anything that belonged in Eternity. Fabric frayed at the edges, darkened in places, like it had been through more than it should have survived.

They didn’t glow.
Didn’t carry the same refined presence as the angels.

But they didn’t look out of place either.

Which was worse.

Lyiri didn’t move.
Didn’t speak.

For the first time—
She looked stunned.

The figure lifted their head slightly.
Eyes locking onto him.

Recognition.

Not curiosity.

Not fear.

Recognition.

“The Sunrider,” they said.

Their voice was steady.
Worn.
But clear.

Then—
More specific.

“Oros.”

Silence fell instantly.

Arian stiffened.
Lyiri didn’t react outwardly—
But her wings shifted just slightly.

That name—
Didn’t belong here.

Didn’t belong anywhere.

He didn’t respond right away.

Didn’t correct it.
Didn’t deny it.

He just watched.

The pull—
Stronger now.

Connected.

Direct.

“I need your help,” the figure said.

No demand.
No explanation.

Just truth.

And something beneath it—
Something heavy.

Something unfinished.

The air in Eternity held still.

Waiting.

For his answer.
