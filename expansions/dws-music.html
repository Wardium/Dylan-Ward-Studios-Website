<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DWS Music</title>
  <style>
    /* --- GLOBAL STYLES & VARIABLES --- */
    :root {
      var(--bg-gradient): linear-gradient(135deg, #2b1055 0%, #7597de 100%);
      --text-color: #ffffff;
      --shadow: 0 15px 35px rgba(0,0,0,0.3);
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #2b1055 0%, #7597de 100%);
      background-attachment: fixed;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text-color);
      overflow-x: hidden;
    }

    /* --- HEADER & INTRO ANIMATION --- */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: height 1s cubic-bezier(0.8, 0, 0.2, 1), background 1s;
      z-index: 100;
    }

    header.shrunk {
      height: 90px;
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      border-bottom: 1px solid var(--glass-border);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: clamp(10px, 3vw, 15px);
    }

    .logo {
      width: clamp(60px, 15vw, 90px);
      height: clamp(60px, 15vw, 90px);
      background: #fff;
      border-radius: 20px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: scale(0.8);
      animation: logoFadeInGrow 1s forwards ease-out;
      display: flex; 
      align-items: center; 
      justify-content: center; 
      color: #000;
      font-weight: 900;
      font-size: clamp(18px, 5vw, 28px);
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 20px;
    }

    @keyframes logoFadeInGrow {
      to { opacity: 1; transform: scale(1); }
    }

    .music-text {
      display: flex;
      font-size: clamp(2rem, 8vw, 3.5rem); 
      font-weight: 800;
      letter-spacing: 2px;
    }

    .music-text span {
      display: inline-block;
      opacity: 0;
      transform: translateY(60px) rotate(-20deg) scale(0.5);
    }

    .music-text.show span {
      animation: goofyJump 0.7s forwards cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .music-text span:nth-child(1) { animation-delay: 0.1s; }
    .music-text span:nth-child(2) { animation-delay: 0.2s; }
    .music-text span:nth-child(3) { animation-delay: 0.3s; }
    .music-text span:nth-child(4) { animation-delay: 0.4s; }
    .music-text span:nth-child(5) { animation-delay: 0.5s; }

    @keyframes goofyJump {
      50% { transform: translateY(-25px) rotate(15deg) scale(1.1); opacity: 1; }
      100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    }

    /* --- MAIN ALBUM LIST --- */
    main {
      padding-top: 130px; 
      max-width: 1100px;
      margin: 0 auto;
      padding-bottom: 50px;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 1s, transform 1s;
      display: none; 
    }

    main.visible {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    .album-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 80px;
      gap: 50px;
      padding: 0 20px;
    }

    .album-info {
      flex: 1;
      text-align: left;
    }

    .album-info h2 {
      font-size: clamp(2rem, 6vw, 3rem);
      margin: 0 0 15px 0;
      text-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .album-info p {
      font-size: clamp(1rem, 3vw, 1.2rem);
      opacity: 0.85;
      line-height: 1.6;
    }

    .album-cover-container {
      flex: 1;
      display: flex;
      justify-content: flex-end;
      perspective: 1000px; 
    }

    .album-cover {
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1 / 1; 
      background: #ccc; 
      border-radius: 20px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      transform-style: preserve-3d;
      background-size: cover;
      background-position: center;
    }

    .album-cover:hover {
      transform: rotateY(-12deg) rotateX(8deg) scale(1.05);
      box-shadow: -15px 25px 40px rgba(0,0,0,0.4);
    }

    /* --- SINGLE ALBUM INTERIOR VIEW --- */
    #single-album-view {
      display: none; 
      opacity: 0;
      transform: scale(0.95) translateY(20px);
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      max-width: 1100px;
      margin: 130px auto 50px;
      padding: 0 20px;
    }

    #single-album-view.active {
      display: flex;
      opacity: 1;
      transform: scale(1) translateY(0);
      gap: 60px;
    }

    .single-cover-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .single-cover {
      width: 100%;
      max-width: 450px;
      aspect-ratio: 1 / 1;
      border-radius: 25px;
      box-shadow: var(--shadow);
      background-size: cover;
      background-position: center;
      /* The slow, ambient float when paused */
      animation: floatAlive 5s infinite ease-in-out; 
      transition: transform 0.2s;
    }

    /* NEW: The faster, punchy dance when playing */
    .single-cover.dancing {
      animation: danceToBeat 0.8s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes floatAlive {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(1deg); }
    }

    @keyframes danceToBeat {
      0% { transform: scale(1) rotate(-1deg); box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
      100% { transform: scale(1.05) rotate(2deg); box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
    }

    .track-list-container {
      flex: 1.2;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 25px;
      padding: clamp(20px, 5vw, 40px);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      width: 100%;
      box-sizing: border-box;
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 25px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1.1rem;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .back-btn:hover {
      opacity: 1;
    }

    #active-album-title {
      font-size: clamp(1.8rem, 6vw, 2.5rem);
      margin: 0 0 30px 0;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 15px;
    }

    .track-list {
      flex-grow: 1;
      overflow-y: auto;
    }

    .track-item {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      margin-bottom: 10px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }

    .track-item:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateX(10px);
    }

    .play-btn {
      width: 40px;
      height: 40px;
      min-width: 40px;
      background: var(--text-color);
      color: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 20px;
      font-size: 0.9rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* --- RESPONSIVE MEDIA QUERIES (VERTICAL STACKING) --- */
    @media (max-width: 800px) {
      .album-row {
        flex-direction: column; 
        text-align: center;
        gap: 30px;
        margin-bottom: 70px;
      }

      .album-info { width: 100%; }
      .album-cover-container { justify-content: center; width: 100%; }
      .album-cover { max-width: 320px; width: 100%; }

      #single-album-view.active {
        flex-direction: column; 
        gap: 40px;
        align-items: center;
      }
      
      .single-cover-container { width: 100%; }
      .single-cover { max-width: 320px; }
      
      .track-item:hover {
        transform: none; 
        background: rgba(255, 255, 255, 0.2);
      }
    }
  </style>
</head>
<body>

  <header id="main-header">
    <div class="logo-container">
      <div class="logo" id="dws-logo">
        DWS
      </div>
      <div class="music-text" id="music-text">
        <span>M</span><span>U</span><span>S</span><span>I</span><span>C</span>
      </div>
    </div>
  </header>

  <main id="album-list">
    </main>

  <div id="single-album-view">
    <div class="single-cover-container">
      <div class="single-cover" id="active-cover"></div>
    </div>
    <div class="track-list-container">
      <div class="back-btn" onclick="goBack()">← Back to Library</div>
      <h2 id="active-album-title">Album Name</h2>
      <div class="track-list" id="track-list">
        </div>
    </div>
  </div>

  <audio id="audio-player"></audio>

  <script>
    const musicDatabase = [
      {
        id: 1,
        title: "Neon Echoes",
        description: "A retro-futuristic blend of analog synths and modern bass. Step into the digital frontier.",
        coverColor: "linear-gradient(45deg, #ff007f, #7928ca)", 
        tracks: [
          { title: "System Override", src: "audio/track1.mp3" },
          { title: "Cybernetic Horizon", src: "audio/track2.mp3" },
          { title: "Neon Echoes", src: "audio/track3.mp3" }
        ]
      },
      {
        id: 2,
        title: "Midnight Drives",
        description: "Smooth, rhythmic tracks designed for empty highways and late-night contemplation.",
        coverColor: "linear-gradient(45deg, #111, #444)",
        tracks: [
          { title: "Engine Ignition", src: "audio/track4.mp3" },
          { title: "Streetlights", src: "audio/track5.mp3" },
          { title: "Dashboard Confessions", src: "audio/track6.mp3" },
          { title: "Arrival", src: "audio/track7.mp3" }
        ]
      }
    ];

    // NEW: Global variables to track what is currently playing
    let currentAudioSrc = null;
    let isPlaying = false;

    window.onload = () => {
      const musicText = document.getElementById('music-text');
      const header = document.getElementById('main-header');
      const mainContent = document.getElementById('album-list');

      setTimeout(() => {
        musicText.classList.add('show');
      }, 1200);

      setTimeout(() => {
        header.classList.add('shrunk');
        mainContent.style.display = 'block';
        setTimeout(() => {
           mainContent.classList.add('visible');
        }, 50); 
      }, 3500);

      renderAlbums();
    };

    function renderAlbums() {
      const listContainer = document.getElementById('album-list');
      listContainer.innerHTML = '';

      musicDatabase.forEach(album => {
        const row = document.createElement('div');
        row.className = 'album-row';

        row.innerHTML = `
          <div class="album-info">
            <h2>${album.title}</h2>
            <p>${album.description}</p>
          </div>
          <div class="album-cover-container">
            <div class="album-cover" style="background: ${album.coverColor};" onclick="openAlbum(${album.id})"></div>
          </div>
        `;
        listContainer.appendChild(row);
      });
    }

    function openAlbum(albumId) {
      const album = musicDatabase.find(a => a.id === albumId);
      const listContainer = document.getElementById('album-list');
      const singleView = document.getElementById('single-album-view');
      const cover = document.getElementById('active-cover');

      listContainer.classList.remove('visible');
      
      setTimeout(() => {
        listContainer.style.display = 'none';

        cover.style.background = album.coverColor;
        document.getElementById('active-album-title').innerText = album.title;

        // Clear existing tracks
        const trackList = document.getElementById('track-list');
        trackList.innerHTML = '';
        
        // Generate new tracks and check if one is currently playing
        let albumHasPlayingTrack = false;

        album.tracks.forEach((track, index) => {
          const buttonId = `play-btn-${index}`;
          const isThisTrackPlaying = (currentAudioSrc === track.src && isPlaying);
          const icon = isThisTrackPlaying ? '⏸' : '▶';
          
          if (isThisTrackPlaying) albumHasPlayingTrack = true;

          trackList.innerHTML += `
            <div class="track-item" onclick="togglePlay('${track.src}', '${buttonId}')">
              <div class="play-btn" id="${buttonId}">${icon}</div>
              <div style="font-weight: bold;">${index + 1}. ${track.title}</div>
            </div>
          `;
        });

        // If we opened the album and a song inside it is playing, make it dance!
        if (albumHasPlayingTrack) {
          cover.classList.add('dancing');
        } else {
          cover.classList.remove('dancing');
        }

        singleView.style.display = 'flex';
        setTimeout(() => {
          singleView.classList.add('active');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }, 50);

      }, 500); 
    }

    function goBack() {
      const listContainer = document.getElementById('album-list');
      const singleView = document.getElementById('single-album-view');

      singleView.classList.remove('active');
      
      setTimeout(() => {
        singleView.style.display = 'none';
        
        listContainer.style.display = 'block';
        setTimeout(() => {
           listContainer.classList.add('visible');
        }, 50);
      }, 600);
    }

    // NEW: Function to handle Play/Pause and visual updates
    function togglePlay(src, buttonId) {
      const player = document.getElementById('audio-player');
      const cover = document.getElementById('active-cover');
      const clickedBtn = document.getElementById(buttonId);
      const allButtons = document.querySelectorAll('.play-btn');

      // 1. If we clicked the song that is ALREADY playing
      if (currentAudioSrc === src && isPlaying) {
        // Pause it
        player.pause();
        isPlaying = false;
        cover.classList.remove('dancing');
        clickedBtn.innerText = '▶';
      } 
      // 2. If we clicked a NEW song, or resumed a paused song
      else {
        // Reset ALL buttons back to Play icon
        allButtons.forEach(btn => btn.innerText = '▶');

        // Only load a new track if the source actually changed
        if (currentAudioSrc !== src) {
          player.src = src;
          currentAudioSrc = src;
        }

        // Try to play the audio. If the file doesn't exist yet, catch the error so the animation still works for prototyping!
        let playPromise = player.play();
        if (playPromise !== undefined) {
          playPromise.catch(error => {
            console.log("Audio file not found yet. Simulating playback animation.");
          });
        }

        // Update visuals
        isPlaying = true;
        cover.classList.add('dancing');
        clickedBtn.innerText = '⏸';
      }
    }
  </script>
</body>
</html>
