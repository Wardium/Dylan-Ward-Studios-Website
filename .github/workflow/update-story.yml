name: Build and Deploy DWS Website

on:
  push:
    branches:
      - main
    paths:
      - 'expansions/DWSStories/stories/**'
      - 'expansions/DWSStories/build.js'
      - 'expansions/DWSStories/dws-stories.html'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    # THIS MUST BE INDENTED EXACTLY 4 SPACES
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Stories Build Script
        working-directory: expansions/DWSStories
        run: node build.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
