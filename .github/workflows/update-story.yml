name: DWS Stories

on:
  push:
    branches: ["main"]
    paths:
      - 'expansions/DWSStories/**'
  workflow_dispatch:

permissions:
  contents: write  # THE FIX: This gives the bot permission to save files to your repo
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Database Build Script
        run: |
          cd expansions/DWSStories
          node build.js

      - name: Commit and Push database.js
        # THE FIX: The bot logs in, grabs the new file, and pushes it to your repo
        run: |
          git config --global user.name "StoryTeller"
          git config --global user.email "github-bot@users.noreply.github.com"
          git add expansions/DWSStories/database.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generated database.js" && git push)

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
