name: DWS Music

# Wakes the robot up ONLY when files inside the specific albums folder change
on:
  push:
    branches:
      - main 
    paths:
      - 'expansions/DWSMusic/albums/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # CD into the expansion folder first, then run the script
      - name: Run build script
        run: |
          cd expansions/DWSMusic
          node build-db.js

      # Target the specific database file for the commit
      - name: Commit and push changes
        run: |
          git config --global user.name 'Professional DJ'
          git config --global user.email 'github-bot@users.noreply.github.com'
          git add expansions/DWSMusic/database.js
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-updated DWS Music database"
          git push
