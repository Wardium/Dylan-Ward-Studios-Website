name: Build and Deploy DWS Website

on:
  push:
    branches:
      - main # Change this if your default branch is 'master'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Stories Build Script
        # This tells the action to run the script from your specific folder
        working-directory: expansions/DWSStories
        run: node build.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Uploads the entire root directory (the whole website)
          path: '.' 

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
