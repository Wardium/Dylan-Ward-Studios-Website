name: Build and Deploy DWS Website

on:
  push:
    branches:
      - main
    # --- ONLY RUN IF THESE FILES CHANGE ---
    paths:
      - 'expansions/DWSStories/stories/**'     # Any new or edited story JSON
      - 'expansions/DWSStories/build.js'      # Changes to the build logic
      - 'expansions/DWSStories/index.html'    # Changes to the stories interface
      - '.github/workflows/deploy.yml'        # Changes to this deployment file
    # ---------------------------------------

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Stories Build Script
        working-directory: expansions/DWSStories
        run: node build.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
